name: neighbourgo
description: NeighbourGo - Community Service Platform for Singapore
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Firebase ──────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4

  # ── UI & Design ───────────────────────────────────────────────
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # ── Media ─────────────────────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # ── Maps & Location ───────────────────────────────────────────
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # ── Networking ────────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.0.3

  # ── Storage / Cache ───────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── Payments ─────────────────────────────────────────────────
  flutter_stripe: ^11.1.0
  cloud_functions: ^5.1.3

  # ── Utilities ────────────────────────────────────────────────
  intl: ^0.19.0
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  uuid: ^4.5.0
  pinput: ^5.0.0
  flutter_rating_bar: ^4.0.1
  infinite_scroll_pagination: ^4.0.0
  photo_view: ^0.15.0
  fl_chart: ^0.69.0

  # ── Code Generation annotations ───────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
