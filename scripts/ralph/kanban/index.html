<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ralph Kanban · NeighbourGo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1d2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 28px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #fff; }
    .header h1 span { color: #63b3ed; }
    .header-meta { font-size: 12px; color: #718096; margin-top: 2px; }

    .stats-row {
      display: flex; gap: 16px; align-items: center;
    }
    .stat-badge {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-badge.done { border-color: #276749; color: #68d391; }
    .stat-badge.todo { border-color: #744210; color: #f6ad55; }
    .stat-badge.total { border-color: #2c5282; color: #63b3ed; }

    .refresh-btn {
      background: #2d3748;
      border: 1px solid #4a5568;
      color: #e2e8f0;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .refresh-btn:hover { background: #4a5568; }
    .auto-refresh { font-size: 11px; color: #718096; }

    /* Progress bar */
    .progress-section {
      padding: 16px 32px 0;
    }
    .progress-bar-bg {
      background: #1a202c;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
      border: 1px solid #2d3748;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #38a169, #68d391);
      border-radius: 8px;
      transition: width 0.6s ease;
    }
    .progress-label {
      font-size: 12px;
      color: #718096;
      margin-top: 6px;
      text-align: right;
    }

    /* Board */
    .board-wrap {
      padding: 24px 32px;
      overflow-x: auto;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      min-width: 760px;
    }

    .column {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 16px;
    }
    .col-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2d3748;
    }
    .col-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .col-todo .col-title { color: #f6ad55; }
    .col-done .col-title { color: #68d391; }
    .col-info .col-title { color: #63b3ed; }
    .col-count {
      background: #2d3748;
      border-radius: 12px;
      padding: 2px 9px;
      font-size: 12px;
      color: #a0aec0;
    }

    /* Cards */
    .card {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      transition: transform 0.1s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-1px); }
    .card:last-child { margin-bottom: 0; }

    .card-todo { border-left: 3px solid #f6ad55; }
    .card-done { border-left: 3px solid #38a169; opacity: 0.75; }
    .card-done:hover { opacity: 1; }

    .card-id {
      font-size: 10px;
      color: #4a5568;
      font-family: monospace;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .card-done .card-title { color: #a0aec0; text-decoration: line-through; text-decoration-color: #4a5568; }

    .card-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .status-done { background: #1a3828; color: #68d391; }
    .status-todo { background: #2d2010; color: #f6ad55; }

    .criteria-list {
      margin-top: 8px;
      list-style: none;
    }
    .criteria-list li {
      font-size: 12px;
      color: #718096;
      padding: 2px 0;
      display: flex; align-items: flex-start; gap: 6px;
      line-height: 1.4;
    }
    .criteria-list li::before {
      content: '›';
      color: #4a5568;
      flex-shrink: 0;
    }

    /* PRD info card */
    .info-card {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .info-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
    .info-row:last-child { margin-bottom: 0; }
    .info-key { color: #718096; min-width: 70px; flex-shrink: 0; }
    .info-val { color: #e2e8f0; font-weight: 500; word-break: break-all; }
    .branch-val { font-family: monospace; font-size: 12px; background: #1a202c; padding: 1px 6px; border-radius: 4px; color: #63b3ed; }

    /* Progress log */
    .progress-log {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: monospace;
      font-size: 11px;
      color: #718096;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.6;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #4a5568;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .empty-state code {
      background: #1a202c;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      color: #63b3ed;
    }

    /* No prd banner */
    .no-prd {
      margin: 32px;
      background: #1a202c;
      border: 1px dashed #4a5568;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
    }
    .no-prd h2 { color: #a0aec0; margin-bottom: 12px; }
    .no-prd p { color: #718096; font-size: 14px; line-height: 1.8; }
    .no-prd code { background: #0f1117; padding: 2px 8px; border-radius: 4px; color: #63b3ed; font-family: monospace; font-size: 13px; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #4a5568;
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Last updated */
    .last-updated {
      font-size: 11px;
      color: #4a5568;
      margin-left: 8px;
    }

    @media (max-width: 900px) {
      .board { grid-template-columns: 1fr; }
      .stats-row { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🏘️</div>
    <div>
      <h1>Ralph Kanban · <span>NeighbourGo</span></h1>
      <div class="header-meta" id="prd-name">Loading...</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-badge done" id="stat-done">✅ 0 Done</div>
    <div class="stat-badge todo" id="stat-todo">⏳ 0 Todo</div>
    <div class="stat-badge total" id="stat-total">📋 0 Total</div>
    <button class="refresh-btn" onclick="load()">
      <span id="spinner-icon">↻</span> Refresh
    </button>
    <div class="auto-refresh" id="countdown">auto in 10s</div>
  </div>
</div>

<div class="progress-section" id="progress-section" style="display:none">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progress-label"></div>
</div>

<div id="main-content">
  <div style="text-align:center;padding:60px;color:#4a5568">
    <div class="spinner"></div>
    <p style="margin-top:12px;font-size:14px">Loading...</p>
  </div>
</div>

<script>
  let countdown = 10;
  let timer;

  function startCountdown() {
    clearInterval(timer);
    countdown = 10;
    document.getElementById('countdown').textContent = `auto in ${countdown}s`;
    timer = setInterval(() => {
      countdown--;
      document.getElementById('countdown').textContent = `auto in ${countdown}s`;
      if (countdown <= 0) { load(); }
    }, 1000);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderCard(story) {
    const done = story.passes === true;
    const criteria = (story.acceptanceCriteria || [])
      .map(c => `<li>${esc(c)}</li>`).join('');
    return `
      <div class="card card-${done ? 'done' : 'todo'}">
        <div class="card-id">${esc(story.id || '')}</div>
        <div class="card-title">${esc(story.title || '(untitled)')}</div>
        <span class="card-status ${done ? 'status-done' : 'status-todo'}">
          ${done ? '✅ Done' : '⏳ Todo'}
        </span>
        ${criteria ? `<ul class="criteria-list">${criteria}</ul>` : ''}
      </div>`;
  }

  function render(data, progress) {
    const stories = data.userStories || [];
    const done = stories.filter(s => s.passes === true);
    const todo = stories.filter(s => s.passes !== true);
    const total = stories.length;
    const pct = total > 0 ? Math.round((done.length / total) * 100) : 0;

    // Header stats
    document.getElementById('stat-done').textContent = `✅ ${done.length} Done`;
    document.getElementById('stat-todo').textContent = `⏳ ${todo.length} Todo`;
    document.getElementById('stat-total').textContent = `📋 ${total} Total`;
    document.getElementById('prd-name').textContent =
      (data.featureName || data.name || 'NeighbourGo') +
      (data.branchName ? ` · ${data.branchName}` : '');

    // Progress bar
    if (total > 0) {
      document.getElementById('progress-section').style.display = 'block';
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent =
        `${done.length} / ${total} stories complete (${pct}%)`;
    }

    const infoCard = `
      <div class="info-card">
        ${data.featureName ? `<div class="info-row"><span class="info-key">Feature</span><span class="info-val">${esc(data.featureName)}</span></div>` : ''}
        ${data.branchName ? `<div class="info-row"><span class="info-key">Branch</span><span class="info-val"><code class="branch-val">${esc(data.branchName)}</code></span></div>` : ''}
        ${data.description ? `<div class="info-row"><span class="info-key">Goal</span><span class="info-val">${esc(data.description)}</span></div>` : ''}
        <div class="info-row"><span class="info-key">Stories</span><span class="info-val">${total} total · ${done.length} done · ${todo.length} remaining</span></div>
      </div>`;

    const todoCards = todo.length
      ? todo.map(renderCard).join('')
      : `<div class="empty-state"><div class="icon">🎉</div><p>All done!</p></div>`;

    const doneCards = done.length
      ? done.map(renderCard).join('')
      : `<div class="empty-state"><div class="icon">⏳</div><p>Nothing completed yet</p></div>`;

    const progressHtml = `
      <div>
        <div class="info-card" style="margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:#718096">
          <span>📝</span> progress.txt
        </div>
        <div class="progress-log">${esc(progress)}</div>
      </div>`;

    document.getElementById('main-content').innerHTML = `
      <div class="board-wrap">
        <div class="board">
          <div class="column col-info">
            <div class="col-header">
              <span class="col-title">PRD Info</span>
            </div>
            ${infoCard}
            ${progressHtml}
          </div>
          <div class="column col-todo">
            <div class="col-header">
              <span class="col-title">Todo</span>
              <span class="col-count">${todo.length}</span>
            </div>
            ${todoCards}
          </div>
          <div class="column col-done">
            <div class="col-header">
              <span class="col-title">Done</span>
              <span class="col-count">${done.length}</span>
            </div>
            ${doneCards}
          </div>
        </div>
      </div>`;
  }

  function renderNoPrd(hint) {
    document.getElementById('main-content').innerHTML = `
      <div class="no-prd">
        <h2>📋 No prd.json found</h2>
        <p>
          Create <code>scripts/ralph/prd.json</code> in your NeighbourGo project to get started.<br/><br/>
          Or copy the example:<br/>
          <code>cp scripts/ralph/prd.json.example scripts/ralph/prd.json</code><br/><br/>
          ${hint ? esc(hint) : ''}
        </p>
      </div>`;
    document.getElementById('prd-name').textContent = 'No PRD loaded';
  }

  async function load() {
    document.getElementById('spinner-icon').innerHTML = '<span class="spinner"></span>';
    startCountdown();

    try {
      const [prdRes, progressRes] = await Promise.all([
        fetch('/api/prd').catch(() => null),
        fetch('/api/progress').catch(() => null),
      ]);

      const progress = progressRes ? await progressRes.text() : '(unavailable)';

      if (!prdRes || !prdRes.ok) {
        const err = prdRes ? await prdRes.json().catch(() => ({})) : {};
        renderNoPrd(err.hint || '');
        document.getElementById('spinner-icon').textContent = '↻';
        return;
      }

      const data = await prdRes.json();
      render(data, progress);
    } catch(e) {
      document.getElementById('main-content').innerHTML =
        `<div class="no-prd"><h2>⚠️ Error</h2><p>${esc(e.message)}</p></div>`;
    }

    document.getElementById('spinner-icon').textContent = '↻';
  }

  load();
</script>
</body>
</html>
